<div id="sidebar">
  <h3>Построение ортодромии</h3>
  
  <div class="coordinates-grid">
    <div class="input-group">
      <label>Долгота 1 (Lon)</label>
      <input type="number" [(ngModel)]="params.lon1" step="any">
    </div>
    <div class="input-group">
      <label>Широта 1 (Lat)</label>
      <input type="number" [(ngModel)]="params.lat1" step="any">
    </div>
  </div>

  <div class="coordinates-grid">
    <div class="input-group">
      <label>Долгота 2 (Lon)</label>
      <input type="number" [(ngModel)]="params.lon2" step="any">
    </div>
    <div class="input-group">
      <label>Широта 2 (Lat)</label>
      <input type="number" [(ngModel)]="params.lat2" step="any">
    </div>
  </div>

  <div class="input-group">
    <label>Система координат</label>
    <select [(ngModel)]="params.coordMode">
      <option value="CK-42">CK-42(4284)</option>
      <option value="WGS84">WGS84(4326)</option>
      <option value="Меркатор">Меркатор(3857)</option>
    </select>
  </div>

  <div class="input-group">
    <label>Количество точек</label>
    <input type="number" [(ngModel)]="params.points" min="1">
  </div>

  <div style="margin: 15px 0; padding: 10px; border: 1px dashed #ccc; border-radius: 4px;">
    <h4 style="margin-top: 0; margin-bottom: 10px;">Обход запретных зон</h4>
    
    <div class="input-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
      <input type="checkbox" id="avoidZones" [(ngModel)]="params.avoidZones">
      <label for="avoidZones" style="cursor: pointer; margin: 0;">Включить обход зон</label>
    </div>

    <div class="coordinates-grid" *ngIf="params.avoidZones">
      <div class="input-group">
        <label>Отступ буфера</label>
        <input type="number" [(ngModel)]="params.bufferDistance" step="0.01" min="0.001">
      </div>
    </div>
  </div>

  <button (click)="onSubmit()">Построить ортодромию</button>  

<div class="input-group" style="margin-top: 15px;">
    <label>Сохраненные ортодромии</label>
    <select [(ngModel)]="selectedOrthodromy" (change)="onOrthodromySelect()">
      <option [ngValue]="null">-- Выберите сохраненную линию --</option>
      <option *ngFor="let ortho of allSavedOrthodromies" [ngValue]="ortho">
        {{ ortho.name }}
      </option>
    </select>
  </div>

  <button (click)="add_orthodromy()">Сохранить линию</button>
  <button (click)="delete_orthodromy()">Удалить линию</button>

  <h3>Исследуемая окружность</h3>
  
  <div class="coordinates-grid">
    <div class="input-group">
      <label>Долгота(Lon)</label>
      <input type="number" [(ngModel)]="params.lon" step="any">
    </div>
    <div class="input-group">
      <label>Широта(Lat)</label>
      <input type="number" [(ngModel)]="params.lat" step="any">
    </div>
        <div class="input-group">
      <label>Радиус (м)</label>
      <input type="number" [(ngModel)]="params.radius" step="any">
    </div>
  </div>
  <button (click)="onSubmit_circle()">Построить окружность</button>

  <div class="form-group" style="margin-top: 15px;">
    <label for="orthodromySelect" class="form-label">Ортодромии, пересекающие зону:</label>
    <select 
      id="orthodromySelect" 
      class="form-control" 
      [(ngModel)]="selectedIntersectingOrthodromy" 
      (change)="onIntersectingOrthodromySelect()"
      [disabled]="intersectingOrthodromies.length === 0">
      
      <option [ngValue]="null" disabled selected>
        {{ intersectingOrthodromies.length > 0 ? '-- Выберите линию --' : 'Нет пересекающих линий' }}
      </option>
      <option *ngFor="let item of intersectingOrthodromies" [ngValue]="item">
        {{ item.name }}
      </option>
    </select>
  </div>

  
  <hr style="width:100%; border:0; border-top:1px solid #ccc;">
  <p class="hint">Используйте панель на карте слева, чтобы нарисовать новые зоны запрета.</p>
</div>
