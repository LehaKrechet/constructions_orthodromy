<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Расчет ортодромии</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 320px;
            padding: 20px;
            background: #f8f9fa;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #map {
            flex-grow: 1;
            height: 100%;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            background-color: white;
        }
        button {
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        button:hover {
            background: #0056b3;
        }
        .coordinates-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Построение ортодромии</h3>
    
    <div class="coordinates-grid">
        <div class="input-group">
            <label>Долгота 1 (Lon)</label>
            <input type="number" id="lon1" step="any" value="37.61357696727">
        </div>
        <div class="input-group">
            <label>Широта 1 (Lat)</label>
            <input type="number" id="lat1" step="any" value="55.7541099812487752">
        </div>
    </div>

    <div class="coordinates-grid">
        <div class="input-group">
            <label>Долгота 2 (Lon)</label>
            <input type="number" id="lon2" step="any" value="160.75293945312">
        </div>
        <div class="input-group">
            <label>Широта 2 (Lat)</label>
            <input type="number" id="lat2" step="any" value="55.855275">
        </div>
    </div>

    <div class="input-group">
        <label>Система координат</label>
        <select id="coordMode">
            <option value="CK-42">CK-42(4284)</option>
            <option value="WGS84" selected>WGS84(4326)</option>
            <option value="Меркатор">Меркатор(3857)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Количество рассчитываемых точек</label>
        <input type="number" id="points" value="10" min="1">
    </div>

    <button id="submitBtn">Построить линию</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Инициализация карты
    const map = L.map('map').setView([55.75, 37.61], 4);

    // Добавление слоя карты (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Переменная для хранения слоя текущей линии (чтобы стирать старую перед отрисовкой новой)
    let currentPolyline = null;

    // Функция отправки данных на сервер
    async function updateMap() {
        // Собираем данные из полей ввода
        const payload = {
            lon1: document.getElementById('lon1').value,
            lat1: document.getElementById('lat1').value,
            lon2: document.getElementById('lon2').value,
            lat2: document.getElementById('lat2').value,
            points: document.getElementById('points').value,
            coordMode: document.getElementById('coordMode').value
        };

        try {
            // Делаем асинхронный POST-запрос на Flask-сервер
            const response = await fetch('/calculate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.status === 'success') {
                // Если старая линия существует удаляем её с карты
                if (currentPolyline) {
                    map.removeLayer(currentPolyline);
                }

                currentPolyline = L.polyline(data.coords, {
                    color: '#ff4757',
                    weight: 4,
                    opacity: 0.8
                }).addTo(map);

                // Автоматически масштабируем карту чтобы линия помещалась в экран целиком
                map.fitBounds(currentPolyline.getBounds(), { padding: [50, 50] });
            } else {
                alert('Ошибка сервера: ' + data.message);
            }

        } catch (error) {
            console.error('Ошибка сети/запроса:', error);
            alert('Не удалось связаться с сервером.');
        }
    }

    document.getElementById('submitBtn').addEventListener('click', updateMap);
    
    updateMap();
</script>
</body>
</html>
